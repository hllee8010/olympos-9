var passages = [

{

  sentences: [
    {
      en: "Coping with impulsivity is a more complicated ability than it appears, and for a long time we thought only humans could do it.",

      grammar: [
        {tag:"동명사주어", body:"Coping with impulsivity: 동명사구 주어 — 단수 취급(is)."},

    },
    {

        {tag:"조건절", body:"If you put ... and tell: 현재시제 조건절. 주절은 will follow."},
        {tag:"동명사", body:"resist eating: resist는 동명사 목적어를 취하는 동사. resist + v-ing."}
      ]
    },
    {
      en: "Some of the kids will try to distract themselves by playing with toys or drawing as a way to cope with the frustration of delaying gratification.",

      kr: "일부 아이들은 만족을 지연시키는 좌절에 대처하는 방법으로 장난감을 가지고 놀거나 그림을 그림으로써 스스로의 주의를 분산시키려 할 것이다.",

        {tag:"by+동명사", body:"by playing ... or drawing: '~함으로써' 수단 표현."},
        {tag:"재귀대명사", body:"distract themselves: 주어와 목적어가 동일 — 재귀대명사."}
      ]
    },
    {
      en: "Some of the kids will just give up and grab the candy.",
      slash: "Some of the kids / will just give up / and grab the candy.",
      kr: "일부 아이들은 그냥 포기하고 사탕을 집을 것이다.",

    },
    {

      kr: "이것은 꽤 발전된 문제 해결 행동인데, 이것이 바로 침팬지도 그것을 할 수 있다는 것을 알게 된 것이 놀라웠던 이유이다.",

    {title:"동명사 주어 (Coping with ~ is)", badge:"동명사", body:"<span class='eng'>Coping with impulsivity is a more complicated ability</span>: 동명사구가 문장 주어 역할. 단수 동사(is) 호응.", point:"출제포인트: 동명사 주어는 단수 동사. is vs. are 오답 유의."},

// ── STATE ──
var currentPassage = 0;
var currentTab = 0;
var quizState = {};

// ── NAVIGATION ──
function selectPassage(idx) {
  currentPassage = idx;
  currentTab = 0;
  document.querySelectorAll(".passage-btn").forEach(function(b,i){ b.classList.toggle("active", i===idx); });
  document.querySelectorAll(".tab-btn").forEach(function(b,i){ b.classList.toggle("active", i===0); });
  renderContent();
}
function selectTab(idx) {
  currentTab = idx;
  document.querySelectorAll(".tab-btn").forEach(function(b,i){ b.classList.toggle("active", i===idx); });
  renderContent();
}

// ── RENDER ──
function renderContent() {
  var p = passages[currentPassage];
  var area = document.getElementById("contentArea");
  var html = "<div class='panel'>";
  html += "<div class='passage-title'>" + p.num + ". " + p.title + "</div>";
  html += "<div class='passage-meta'>올림포스 영미 비문학 읽기 &middot; Theme " + p.num + "</div>";
  if (currentTab===0) html += renderFullText(p);
  else if (currentTab===1) html += renderSentences(p);
  else if (currentTab===2) html += renderGrammar(p);
  else if (currentTab===3) html += renderVocab(p);
  else if (currentTab===4) html += renderTranslation(p);
  else if (currentTab===5) html += renderTopic(p);
  else if (currentTab===6) html += renderQuiz(p);
  html += "</div>";
  area.innerHTML = html;
}

function renderFullText(p) {
  var allSents = p.sentences.map(function(s){ return s.en; }).join(" ");
  return "<h2 class='section-hd'>전문 (Full Text)</h2><div class='full-text-box'>" + allSents + "</div>";
}

function renderSentences(p) {
  var html = "<h2 class='section-hd'>문장 분석</h2>";
  p.sentences.forEach(function(s, i) {
    html += "<div class='sentence-card'><span class='sentence-num'>문장 " + (i+1) + "</span>";
    html += "<div class='sentence-eng'>" + s.en + "</div>";
    html += "<div class='sentence-slash'>&#9670; 직독직해: " + s.slash + "</div>";
    html += "<div class='sentence-kr'>&#127472;&#127479; " + s.kr + "</div>";
    if (s.grammar.length > 0) {
      html += "<div class='grammar-list'>";
      s.grammar.forEach(function(g) {
        html += "<div class='grammar-item'><span class='tag'>" + g.tag + "</span>" + g.body + "</div>";
      });
      html += "</div>";
    }
    html += "</div>";
  });
  return html;
}

function renderGrammar(p) {
  var html = "<h2 class='section-hd'>문법 요소 총정리</h2>";
  p.grammar.forEach(function(g, i) {
    html += "<div class='grammar-section'><div class='grammar-title'><span class='badge'>" + g.badge + "</span>" + (i+1) + ". " + g.title + "</div>";
    html += "<div class='grammar-body'>" + g.body + "</div>";
    html += "<div class='grammar-body' style='margin-top:8px;color:var(--gold);font-size:0.78rem;'>&#128204; " + g.point + "</div></div>";
  });
  return html;
}

function renderVocab(p) {
  var html = "<h2 class='section-hd'>핵심 단어</h2><div class='vocab-grid'>";
  p.vocab.forEach(function(v) {
    html += "<div class='vocab-card'><div><span class='vocab-word'>" + v.word + "</span><span class='vocab-pos'>" + v.pos + "</span></div>";
    html += "<div class='vocab-meaning'>" + v.meaning + "</div><div class='vocab-example'>\"" + v.example + "\"</div></div>";
  });
  html += "</div>";
  return html;
}

function renderTranslation(p) {
  var html = "<h2 class='section-hd'>전문 해석</h2><div class='translation-box'>";
  p.sentences.forEach(function(s, i) {
    html += "<span class='sent'><span class='sent-num-inline'>" + (i+1) + "</span>" + s.kr + "</span>";
  });
  html += "</div>";
  return html;
}

  html += "<h2 class='section-hd' style='margin-top:24px;'>글의 구조</h2><div class='structure-box'>";
  p.structure.forEach(function(s) {
    html += "<div class='structure-item'><span class='s-label'>" + s.label + "</span><span>" + s.body + "</span></div>";
  });
  html += "</div>";
  return html;
}

function renderQuiz(p) {
  var pIdx = currentPassage;
  var answered = 0, correct = 0;
  p.quiz.forEach(function(_, qIdx) {
    var key = pIdx + "_" + qIdx;
    if (quizState[key] !== undefined) { answered++; if (quizState[key]===true) correct++; }
  });
  var html = "<h2 class='section-hd'>변형문제</h2>";
  html += "<div class='score-bar'><div><div class='score-label'>현재 점수</div></div><div class='score-val'>" + (answered>0?correct:"—") + " / " + p.quiz.length + "</div></div>";
  p.quiz.forEach(function(q, qIdx) {
    var key = pIdx + "_" + qIdx;
    var isAnswered = quizState[key] !== undefined;
    var isCorrect = quizState[key] === true;
    html += "<div class='quiz-card'><div class='quiz-num'>문제 " + (qIdx+1) + "</div>";
    html += "<div class='quiz-type'>" + q.type + "</div>";
    html += "<div class='quiz-question'>" + q.question + "</div>";
    if (q.ref) html += "<div class='quiz-passage-ref'>" + q.ref + "</div>";
    html += "<div class='quiz-options'>";
    q.options.forEach(function(opt, oIdx) {
      var cls = "quiz-option";
      if (isAnswered) {
        cls += " disabled";
        if (oIdx===q.answer) cls += " correct";
        else if (quizState[pIdx+"_"+qIdx+"_sel"]===oIdx) cls += " wrong";
      }
      html += "<button class='" + cls + "' onclick='checkAnswer(" + pIdx + "," + qIdx + "," + oIdx + ")'>";
      html += "<span class='opt-num'>" + (oIdx+1) + "</span><span>" + opt + "</span></button>";
    });
    html += "</div>";
    var fbCls = "quiz-feedback" + (isAnswered?" show "+(isCorrect?"correct-fb":"wrong-fb"):"");
    var fbText = isAnswered ? (isCorrect?"&#9989; 정답입니다! ":"&#10060; 오답입니다. ") + q.explanation : "";
    html += "<div class='" + fbCls + "'>" + fbText + "</div>";
    if (isAnswered) html += "<button class='quiz-reset' onclick='resetQuiz(" + pIdx + "," + qIdx + ")'>&#8635; 다시 풀기</button>";
    html += "</div>";
  });
  return html;
}

// ── QUIZ LOGIC ──
function checkAnswer(pIdx, qIdx, selectedIdx) {
  var key = pIdx + "_" + qIdx;
  if (quizState[key] !== undefined) return;
  quizState[key] = passages[pIdx].quiz[qIdx].answer === selectedIdx;
  quizState[pIdx+"_"+qIdx+"_sel"] = selectedIdx;
  renderContent();
}
function resetQuiz(pIdx, qIdx) {
  delete quizState[pIdx+"_"+qIdx];
  delete quizState[pIdx+"_"+qIdx+"_sel"];
  renderContent();
}

renderContent();
</script>
</body>
</html>
